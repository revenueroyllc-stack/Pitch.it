kind = "web"
previewPath = "/"
title = "SayNow Pro"
version = "1.0.0"
id = "artifacts/saynow-pro"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26131

[services.development]
run = "pnpm --filter @workspace/saynow-pro run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/saynow-pro", "run", "build" ]
publicDir = "artifacts/saynow-pro/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26131"
BASE_PATH = "/"
