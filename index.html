<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SayNow Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Clash+Display:wght@400;500;600;700&family=Cabinet+Grotesk:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #080808;
  --s1: #0f0f0f;
  --s2: #141414;
  --s3: #1a1a1a;
  --border: #2a2a2a;
  --border2: #333333;
  --cyan: #c9960c;
  --cyan-dim: rgba(201,150,12,0.12);
  --cyan-glow: rgba(201,150,12,0.25);
  --gold: #f5d97e;
  --gold-dim: rgba(245,217,126,0.12);
  --green: #00c896;
  --green-dim: rgba(0,200,150,0.12);
  --red: #ff4757;
  --red-dim: rgba(255,71,87,0.12);
  --purple: #c9960c;
  --purple-dim: rgba(201,150,12,0.12);
  --text: #ffffff;
  --text2: #c8c8c8;
  --text3: #666666;
  --font-display: 'Epilogue', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-display);
  overflow: hidden;
}

/* Ambient bg */
body::before {
  content:'';
  position:fixed; inset:0;
  background:
    radial-gradient(ellipse 60% 40% at 10% 0%, rgba(6,214,232,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 50% 30% at 90% 100%, rgba(155,93,229,0.05) 0%, transparent 60%);
  pointer-events:none; z-index:0;
}

body::after {
  content:'';
  position:fixed; inset:0;
  background-image:
    linear-gradient(rgba(6,214,232,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(6,214,232,0.025) 1px, transparent 1px);
  background-size: 32px 32px;
  pointer-events:none; z-index:0;
}

.shell {
  position:relative; z-index:1;
  height:100vh;
  height:100dvh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* ── Mobile fixes ── */
@media(max-width:768px) {
  .topbar { padding: 10px 12px; }
  .brand-badge { display:none; }
  .save-indicator { display:none !important; }
  .timer-display { font-size:0.7rem; letter-spacing:1px; }
  .live-indicator { padding:5px 8px; font-size:0.62rem; }
  .nav-tab { padding:10px 10px; font-size:0.72rem; }
  .tab-panel { padding:12px; gap:12px; }
  .live-layout { grid-template-columns:1fr !important; }
  .live-right { max-height:300px; }
  .prep-grid { grid-template-columns:1fr !important; }
  .stats-row { grid-template-columns:repeat(2,1fr); }
  .debrief-sections { grid-template-columns:1fr !important; }
  .debrief-card.full { grid-column:1 !important; }
  .controls-bar { flex-wrap:wrap; }
  .vault-grid { grid-template-columns:1fr !important; }
}

/* ── Top Bar ── */
.topbar {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding: 8px 24px;
  border-bottom: 1px solid var(--border);
  background: rgba(10,14,20,0.8);
  backdrop-filter: blur(12px);
  flex-shrink:0;
}

.brand {
  display:flex; align-items:center; gap:10px;
}

.brand-mark {
  width:34px; height:34px;
  background: linear-gradient(135deg, var(--cyan), var(--purple));
  border-radius:9px;
  display:flex; align-items:center; justify-content:center;
  font-size:16px;
  box-shadow: 0 0 20px rgba(6,214,232,0.3);
}

.brand-name {
  font-weight:800; font-size:1.15rem;
  letter-spacing:-0.5px;
}

.brand-name em {
  color: var(--cyan);
  font-style:normal;
}

.brand-badge {
  font-family: var(--font-mono);
  font-size:0.6rem;
  letter-spacing:1.5px;
  text-transform:uppercase;
  padding:2px 7px;
  background: var(--cyan-dim);
  color: var(--cyan);
  border-radius:4px;
  border:1px solid rgba(6,214,232,0.2);
}

.topbar-right {
  display:flex; align-items:center; gap:12px;
}

.live-indicator {
  display:flex; align-items:center; gap:7px;
  padding: 6px 12px;
  border-radius: 20px;
  background: var(--s2);
  border:1px solid var(--border);
  font-family:var(--font-mono);
  font-size:0.68rem;
  letter-spacing:1px;
  color: var(--text3);
  transition: all 0.3s;
}

.live-dot {
  width:6px; height:6px;
  border-radius:50%;
  background: var(--text3);
  transition: all 0.3s;
}

.live-indicator.on { border-color: var(--green); color: var(--green); }
.live-indicator.on .live-dot {
  background: var(--green);
  box-shadow: 0 0 8px var(--green);
  animation: blink 1.4s infinite;
}

.live-indicator.busy { border-color: var(--cyan); color: var(--cyan); }
.live-indicator.busy .live-dot {
  background: var(--cyan);
  box-shadow: 0 0 8px var(--cyan);
  animation: blink 0.7s infinite;
}

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

.timer-display {
  font-family: var(--font-mono);
  font-size:0.8rem;
  color: var(--text2);
  letter-spacing:2px;
}

/* ── Nav Tabs ── */
.nav {
  display:flex;
  border-bottom:1px solid var(--border);
  background: var(--s1);
  flex-shrink:0;
  overflow-x:auto;
}

.nav::-webkit-scrollbar { display:none; }

.nav-tab {
  display:flex; align-items:center; gap:7px;
  padding:12px 20px;
  font-size:0.82rem;
  font-weight:600;
  letter-spacing:0.3px;
  color: var(--text3);
  cursor:pointer;
  border:none;
  background:transparent;
  border-bottom:2px solid transparent;
  transition:all 0.2s;
  white-space:nowrap;
  position:relative;
}

.nav-tab:hover { color: var(--text2); }

.nav-tab.active {
  color: var(--cyan);
  border-bottom-color: var(--cyan);
}

.nav-badge {
  min-width:18px; height:18px;
  background: var(--cyan-dim);
  border:1px solid rgba(6,214,232,0.25);
  color: var(--cyan);
  border-radius:9px;
  font-size:0.6rem;
  display:flex; align-items:center; justify-content:center;
  padding:0 4px;
  font-family: var(--font-mono);
}

/* ── Content area ── */
.content {
  flex:1;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

.tab-panel {
  display:none;
  flex:1;
  overflow-y:auto;
  padding:20px 24px;
  flex-direction:column;
  gap:16px;
}

.tab-panel.active {
  display:flex;
}

.tab-panel::-webkit-scrollbar { width:5px; }
.tab-panel::-webkit-scrollbar-track { background:transparent; }
.tab-panel::-webkit-scrollbar-thumb { background:var(--border2); border-radius:4px; }

/* ── Shared components ── */
.card {
  background: var(--s2);
  border:1px solid var(--border);
  border-radius:14px;
  padding:18px 20px;
}

.card-title {
  font-family: var(--font-mono);
  font-size:0.62rem;
  letter-spacing:2px;
  text-transform:uppercase;
  color: var(--cyan);
  margin-bottom:12px;
  display:flex; align-items:center; gap:6px;
}

.field-label {
  font-size:0.78rem;
  font-weight:600;
  color: var(--text2);
  margin-bottom:6px;
  letter-spacing:0.3px;
}

textarea, input[type=text] {
  width:100%;
  background: var(--s1);
  border:1px solid var(--border);
  border-radius:10px;
  padding:11px 13px;
  color: var(--text);
  font-family: var(--font-display);
  font-size:0.87rem;
  line-height:1.6;
  outline:none;
  transition: border-color 0.2s;
  resize:none;
}

textarea:focus, input[type=text]:focus { border-color: var(--cyan); }
textarea::placeholder, input::placeholder { color: var(--text3); }

.btn {
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  padding:11px 20px;
  border-radius:10px;
  font-family:var(--font-display);
  font-weight:700;
  font-size:0.85rem;
  cursor:pointer;
  border:none;
  transition:all 0.2s;
  letter-spacing:0.2px;
}

.btn-cyan {
  background: linear-gradient(135deg, var(--cyan), #04afc0);
  color:#000;
}
.btn-cyan:hover { box-shadow: 0 6px 20px rgba(6,214,232,0.35); transform:translateY(-1px); }

.btn-red {
  background: linear-gradient(135deg, var(--red), #cc2233);
  color:#fff;
}
.btn-red:hover { box-shadow: 0 6px 20px rgba(255,71,87,0.35); transform:translateY(-1px); }

.btn-ghost {
  background: var(--s2);
  color: var(--text2);
  border:1px solid var(--border);
}
.btn-ghost:hover { border-color: var(--cyan); color:var(--cyan); }

.btn-gold {
  background: linear-gradient(135deg, var(--gold), #c88800);
  color:#000;
}
.btn-gold:hover { box-shadow: 0 6px 20px rgba(240,165,0,0.35); transform:translateY(-1px); }

.btn-full { width:100%; }

/* ══════════════════════════════
   TAB 1 — PRE-CALL PREP
══════════════════════════════ */
.prep-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

@media(max-width:640px) { .prep-grid { grid-template-columns:1fr; } }

.talking-points-list {
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-bottom:10px;
}

.tp-item {
  display:flex;
  align-items:flex-start;
  gap:10px;
  padding:10px 12px;
  background: var(--s1);
  border:1px solid var(--border);
  border-radius:8px;
  font-size:0.85rem;
  line-height:1.5;
  animation: fadeSlide 0.3s ease;
}

.tp-num {
  font-family: var(--font-mono);
  font-size:0.65rem;
  color: var(--cyan);
  background: var(--cyan-dim);
  border-radius:4px;
  padding:2px 6px;
  flex-shrink:0;
  margin-top:2px;
}

.tp-del {
  margin-left:auto;
  background:none;
  border:none;
  color: var(--text3);
  cursor:pointer;
  font-size:1rem;
  padding:0 2px;
  flex-shrink:0;
  transition: color 0.15s;
}
.tp-del:hover { color: var(--red); }

.add-tp-row {
  display:flex;
  gap:8px;
}

.objection-prep-list {
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-bottom:10px;
}

.obj-item {
  background: var(--s1);
  border:1px solid var(--border);
  border-radius:8px;
  overflow:hidden;
  animation: fadeSlide 0.3s ease;
}

.obj-q {
  padding:9px 12px;
  font-size:0.82rem;
  color: var(--gold);
  font-weight:600;
  border-bottom:1px solid var(--border);
  display:flex; justify-content:space-between; align-items:center;
}

.obj-a {
  padding:9px 12px;
  font-size:0.82rem;
  color: var(--text2);
  line-height:1.5;
}

.obj-del {
  background:none; border:none; color:var(--text3); cursor:pointer; font-size:0.9rem;
}
.obj-del:hover { color:var(--red); }

.add-obj-form {
  display:flex;
  flex-direction:column;
  gap:8px;
}

/* AI Generate prep button section */
.ai-generate-section {
  background: linear-gradient(135deg, rgba(6,214,232,0.06), rgba(155,93,229,0.06));
  border:1px solid rgba(6,214,232,0.2);
  border-radius:14px;
  padding:18px 20px;
}

.ai-generate-header {
  display:flex; align-items:center; gap:10px; margin-bottom:10px;
}

.ai-tag {
  font-family: var(--font-mono);
  font-size:0.6rem;
  letter-spacing:1.5px;
  text-transform:uppercase;
  padding:3px 8px;
  background: rgba(155,93,229,0.15);
  color: var(--purple);
  border-radius:4px;
  border:1px solid rgba(155,93,229,0.25);
}

/* ══════════════════════════════
   TAB 2 — LIVE COACH
══════════════════════════════ */
.live-layout {
  display:grid;
  grid-template-columns:1fr 340px;
  gap:16px;
  flex:1;
  min-height:0;
}

@media(max-width:700px) {
  .live-layout { grid-template-columns:1fr; }
}

.live-left {
  display:flex;
  flex-direction:column;
  gap:14px;
  min-height:0;
}

.live-right {
  display:flex;
  flex-direction:column;
  gap:14px;
  min-height:0;
}

.transcript-wrap {
  flex:1;
  background: var(--s2);
  border:1px solid var(--border);
  border-radius:14px;
  padding:16px;
  display:flex;
  flex-direction:column;
  min-height:0;
}

.transcript-body {
  flex:1;
  overflow-y:auto;
  font-family: var(--font-mono);
  font-size:0.78rem;
  line-height:1.8;
  color:var(--text);
  padding-right:4px;
}

.transcript-body::-webkit-scrollbar { width:3px; }
.transcript-body::-webkit-scrollbar-thumb { background:var(--border2); }

.t-placeholder { color:var(--text3); font-style:italic; }
.t-interim { color: var(--text3); font-style:italic; }

.waveform {
  display:flex; align-items:center; gap:3px; height:22px; margin-left:auto;
}

.w-bar {
  width:3px; height:4px;
  background:var(--cyan);
  border-radius:2px;
  opacity:0.2;
}

.w-bar.on { opacity:1; animation: wv 0.9s ease-in-out infinite; }
.w-bar:nth-child(1){animation-delay:0s}
.w-bar:nth-child(2){animation-delay:0.12s}
.w-bar:nth-child(3){animation-delay:0.22s}
.w-bar:nth-child(4){animation-delay:0.17s}
.w-bar:nth-child(5){animation-delay:0.07s}
.w-bar:nth-child(6){animation-delay:0.28s}
.w-bar:nth-child(7){animation-delay:0.1s}
.w-bar:nth-child(8){animation-delay:0.33s}

@keyframes wv { 0%,100%{height:3px} 50%{height:18px} }

.controls-bar {
  display:flex; gap:10px;
}

/* Coach feed */
.coach-feed-wrap {
  flex:1;
  display:flex;
  flex-direction:column;
  background: var(--s2);
  border:1px solid var(--border);
  border-radius:14px;
  padding:16px;
  min-height:0;
}

.coach-feed {
  flex:1;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
  padding-right:2px;
}

.coach-feed::-webkit-scrollbar { width:3px; }
.coach-feed::-webkit-scrollbar-thumb { background:var(--border2); }

/* Coach cards */
.ccard {
  border-radius:12px;
  padding:13px 15px;
  border:1px solid var(--border);
  background: var(--s3);
  position:relative;
  animation: fadeSlide 0.4s cubic-bezier(0.16,1,0.3,1);
  overflow:hidden;
}

.ccard::after {
  content:'';
  position:absolute;
  left:0; top:0; bottom:0;
  width:3px;
}

.ccard.t-response::after { background:var(--cyan); }
.ccard.t-tip::after { background:var(--green); }
.ccard.t-warning::after { background:var(--gold); }
.ccard.t-question::after { background:var(--purple); }

.ccard-head {
  display:flex; align-items:center; gap:7px; margin-bottom:8px;
}

.ccard-type {
  font-family:var(--font-mono);
  font-size:0.58rem;
  letter-spacing:1.5px;
  text-transform:uppercase;
  padding:2px 7px; border-radius:4px; font-weight:500;
}

.t-response .ccard-type { background:var(--cyan-dim); color:var(--cyan); }
.t-tip .ccard-type { background:var(--green-dim); color:var(--green); }
.t-warning .ccard-type { background:var(--gold-dim); color:var(--gold); }
.t-question .ccard-type { background:var(--purple-dim); color:var(--purple); }

.ccard-trigger {
  font-size:0.72rem;
  color:var(--text3);
  font-style:italic;
  flex:1;
}

.ccard-ts {
  font-family:var(--font-mono);
  font-size:0.6rem;
  color:var(--text3);
}

.ccard-body {
  font-size:0.84rem;
  line-height:1.6;
  color:var(--text);
}

.ccard-quote {
  margin-top:9px;
  padding:9px 11px;
  background: rgba(6,214,232,0.06);
  border:1px solid rgba(6,214,232,0.15);
  border-radius:8px;
  font-size:0.82rem;
  color:var(--cyan);
  font-style:italic;
  line-height:1.5;
}

.ccard-actions {
  display:flex; gap:6px; margin-top:10px;
}

.mini-btn {
  padding:4px 10px;
  border-radius:6px;
  font-size:0.72rem;
  border:1px solid var(--border);
  background:transparent;
  color:var(--text3);
  cursor:pointer;
  transition:all 0.15s;
  font-family:var(--font-display);
}

.mini-btn:hover { border-color:var(--cyan); color:var(--cyan); }
.mini-btn.accent { background:var(--cyan-dim); border-color:rgba(6,214,232,0.3); color:var(--cyan); }

/* Thinking */
.thinking-pill {
  display:flex; align-items:center; gap:10px;
  padding:11px 14px;
  background: var(--s3);
  border:1px solid rgba(6,214,232,0.2);
  border-radius:10px;
  animation: fadeSlide 0.3s ease;
}

.t-dots { display:flex; gap:5px; }
.t-dots span {
  width:5px; height:5px;
  background:var(--cyan);
  border-radius:50%;
  animation: tdot 1s infinite;
}
.t-dots span:nth-child(2){animation-delay:0.15s}
.t-dots span:nth-child(3){animation-delay:0.3s}
@keyframes tdot {0%,80%,100%{transform:scale(0.6);opacity:0.4}40%{transform:scale(1);opacity:1}}

.t-dots-label { font-size:0.78rem; color:var(--text3); font-style:italic; }

/* Talking Points sidebar panel */
.tp-panel {
  background: var(--s2);
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px;
  overflow-y:auto;
  max-height:200px;
}

.tp-panel::-webkit-scrollbar { width:3px; }
.tp-panel::-webkit-scrollbar-thumb { background:var(--border2); }

.tp-chip {
  display:flex; align-items:flex-start; gap:8px;
  padding:8px 10px;
  margin-bottom:7px;
  background: var(--s1);
  border:1px solid var(--border);
  border-radius:8px;
  font-size:0.8rem;
  line-height:1.4;
  cursor:pointer;
  transition: border-color 0.15s;
}

.tp-chip:hover { border-color:var(--cyan); }

.tp-chip.covered {
  opacity:0.4;
  text-decoration:line-through;
}

.tp-dot {
  width:6px; height:6px;
  border-radius:50%;
  background:var(--cyan);
  flex-shrink:0;
  margin-top:4px;
}

/* Stats row */
.stats-row {
  display:grid;
  grid-template-columns: repeat(4,1fr);
  gap:10px;
}

.stat-box {
  background:var(--s2);
  border:1px solid var(--border);
  border-radius:10px;
  padding:12px 14px;
  text-align:center;
}

.stat-val {
  font-family:var(--font-mono);
  font-size:1.3rem;
  font-weight:700;
  color:var(--cyan);
}

.stat-lbl {
  font-size:0.65rem;
  color:var(--text3);
  letter-spacing:0.5px;
  margin-top:3px;
  font-family:var(--font-mono);
  text-transform:uppercase;
}

/* Empty state */
.empty {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:10px; padding:32px 20px;
  text-align:center; flex:1;
}

.empty-ico { font-size:2rem; opacity:0.3; }
.empty-h { font-weight:700; font-size:0.95rem; color:var(--text3); }
.empty-p { font-size:0.78rem; color:var(--text3); opacity:0.7; max-width:220px; }

/* ══════════════════════════════
   TAB 3 — OBJECTION VAULT
══════════════════════════════ */
.vault-grid {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(280px,1fr));
  gap:14px;
}

.vault-card {
  background:var(--s2);
  border:1px solid var(--border);
  border-radius:14px;
  padding:18px;
  display:flex;
  flex-direction:column;
  gap:10px;
  transition: border-color 0.2s;
  animation: fadeSlide 0.4s ease;
}

.vault-card:hover { border-color:var(--border2); }

.vault-q {
  font-size:0.88rem;
  font-weight:700;
  color:var(--gold);
  line-height:1.4;
}

.vault-a {
  font-size:0.83rem;
  color:var(--text2);
  line-height:1.6;
  flex:1;
}

.vault-category {
  font-family:var(--font-mono);
  font-size:0.6rem;
  letter-spacing:1.5px;
  text-transform:uppercase;
  padding:2px 8px;
  border-radius:4px;
  background:var(--gold-dim);
  color:var(--gold);
  display:inline-block;
  border:1px solid rgba(240,165,0,0.2);
}

.vault-actions {
  display:flex; gap:6px;
}

/* ══════════════════════════════
   TAB 4 — POST-CALL DEBRIEF
══════════════════════════════ */
.debrief-layout {
  display:flex;
  flex-direction:column;
  gap:16px;
}

.debrief-header {
  display:flex; align-items:center; justify-content:space-between;
  flex-wrap:wrap; gap:10px;
}

.score-pill {
  display:flex; align-items:center; gap:10px;
  padding:10px 18px;
  background: var(--s2);
  border:1px solid var(--border);
  border-radius:12px;
}

.score-ring {
  width:48px; height:48px;
  border-radius:50%;
  background: conic-gradient(var(--cyan) 0%, var(--s3) 0%);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-mono);
  font-size:0.8rem;
  font-weight:700;
  color:var(--cyan);
  position:relative;
  transition: background 1s;
}

.score-ring::before {
  content:'';
  position:absolute;
  inset:4px;
  background:var(--s2);
  border-radius:50%;
}

.score-ring span { position:relative; z-index:1; }

.score-info h3 {
  font-size:0.92rem;
  font-weight:700;
}

.score-info p {
  font-size:0.75rem;
  color:var(--text3);
  margin-top:2px;
}

.debrief-sections {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

@media(max-width:640px) { .debrief-sections { grid-template-columns:1fr; } }

.debrief-card {
  background:var(--s2);
  border:1px solid var(--border);
  border-radius:14px;
  padding:18px;
}

.debrief-card.full { grid-column: 1/-1; }

.debrief-list {
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-top:10px;
}

.debrief-item {
  display:flex; gap:10px; align-items:flex-start;
  padding:9px 11px;
  background: var(--s1);
  border-radius:8px;
  font-size:0.83rem;
  line-height:1.5;
  animation: fadeSlide 0.3s ease;
}

.debrief-item .di-icon { flex-shrink:0; font-size:1rem; }

.moment-item {
  padding:11px 14px;
  background:var(--s1);
  border-radius:10px;
  border-left:3px solid var(--border2);
  font-size:0.83rem;
  line-height:1.5;
  margin-bottom:8px;
  animation: fadeSlide 0.3s ease;
}

.moment-item.good { border-left-color:var(--green); }
.moment-item.miss { border-left-color:var(--red); }
.moment-item.note { border-left-color:var(--gold); }

.moment-label {
  font-family:var(--font-mono);
  font-size:0.6rem;
  letter-spacing:1.5px;
  text-transform:uppercase;
  margin-bottom:4px;
}

.moment-item.good .moment-label { color:var(--green); }
.moment-item.miss .moment-label { color:var(--red); }
.moment-item.note .moment-label { color:var(--gold); }

.debrief-empty {
  padding:32px;
  text-align:center;
  color:var(--text3);
  font-size:0.85rem;
}

/* Animations */
@keyframes fadeSlide {
  from { opacity:0; transform:translateY(12px); }
  to { opacity:1; transform:translateY(0); }
}

/* Toast */
.toast {
  position:fixed;
  bottom:20px; left:50%;
  transform:translateX(-50%) translateY(60px);
  background:var(--s3);
  border:1px solid var(--border2);
  color:var(--text);
  padding:10px 20px;
  border-radius:10px;
  font-size:0.82rem;
  z-index:999;
  transition:transform 0.25s ease;
  white-space:nowrap;
}

.toast.show { transform:translateX(-50%) translateY(0); }

/* Loading spinner */
.spinner {
  width:16px; height:16px;
  border:2px solid rgba(6,214,232,0.2);
  border-top-color:var(--cyan);
  border-radius:50%;
  animation:spin 0.7s linear infinite;
  display:inline-block;
}

@keyframes spin { to{transform:rotate(360deg)} }

.divider {
  height:1px;
  background:var(--border);
  margin:4px 0;
}

/* ── Speech Input Buttons ── */
.field-wrap {
  position: relative;
  display: flex;
  align-items: flex-start;
  gap: 6px;
}

.field-wrap textarea,
.field-wrap input[type=text] {
  flex: 1;
}

.mic-btn {
  flex-shrink: 0;
  width: 36px;
  height: 36px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--s2);
  color: var(--text3);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.95rem;
  transition: all 0.2s;
  margin-top: 0;
  position: relative;
}

.mic-btn:hover {
  border-color: var(--cyan);
  color: var(--cyan);
}

.mic-btn.recording {
  background: var(--red-dim);
  border-color: var(--red);
  color: var(--red);
  animation: mic-pulse 1.2s infinite;
}

@keyframes mic-pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255,71,87,0.4); }
  50% { box-shadow: 0 0 0 6px rgba(255,71,87,0); }
}

.mic-btn.tall {
  height: 56px;
  align-self: stretch;
  margin-top: 0;
}

.mic-btn.textarea-tall {
  height: 80px;
  align-self: stretch;
}

.speech-hint {
  font-size: 0.68rem;
  color: var(--text3);
  font-style: italic;
  margin-top: 4px;
  min-height: 14px;
  transition: color 0.2s;
  font-family: var(--font-mono);
}

.speech-hint.active { color: var(--red); }


/* ── Auth ── */
#authOverlay {
  position:fixed; inset:0; z-index:1000;
  background:rgba(5,7,10,0.96);
  display:flex; align-items:center; justify-content:center;
  backdrop-filter:blur(8px);
}
.auth-box {
  width:100%; max-width:380px;
  background:var(--s2);
  border:1px solid var(--border);
  border-radius:20px;
  padding:36px 32px;
  display:flex; flex-direction:column; gap:16px;
}
.auth-logo {
  text-align:center; margin-bottom:4px;
  font-family:var(--font-display); font-weight:800; font-size:1.6rem;
  letter-spacing:-0.5px;
}
.auth-logo em { color:var(--cyan); font-style:normal; }
.auth-sub {
  text-align:center; font-size:0.82rem; color:var(--text3); margin-top:-8px;
}
.auth-tabs {
  display:flex; background:var(--s1); border-radius:10px; padding:3px; gap:3px;
}
.auth-tab {
  flex:1; padding:8px; border:none; background:transparent;
  border-radius:8px; font-family:var(--font-display); font-size:0.82rem;
  font-weight:600; color:var(--text3); cursor:pointer; transition:all 0.2s;
}
.auth-tab.active { background:var(--s3); color:var(--cyan); }
.auth-input {
  width:100%; background:var(--s1); border:1px solid var(--border);
  border-radius:10px; padding:11px 14px; color:var(--text);
  font-family:var(--font-display); font-size:0.88rem; outline:none;
  transition:border-color 0.2s;
}
.auth-input:focus { border-color:var(--cyan); }
.auth-input::placeholder { color:var(--text3); }
.auth-error {
  font-size:0.78rem; color:var(--red); text-align:center;
  min-height:16px;
}
.user-pill {
  display:flex; align-items:center; gap:8px;
  padding:5px 10px 5px 5px;
  background:var(--s2); border:1px solid var(--border);
  border-radius:20px; cursor:pointer; transition:all 0.2s;
}
.user-pill:hover { border-color:var(--cyan); }
.user-avatar {
  width:26px; height:26px; border-radius:50%;
  background:linear-gradient(135deg,var(--cyan),var(--purple));
  display:flex; align-items:center; justify-content:center;
  font-size:0.7rem; font-weight:700; color:#000;
}
.user-email {
  font-family:var(--font-mono); font-size:0.65rem;
  color:var(--text2); max-width:120px;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.save-indicator {
  font-family:var(--font-mono); font-size:0.6rem;
  color:var(--text3); letter-spacing:1px;
  display:flex; align-items:center; gap:4px;
}
.save-dot {
  width:5px; height:5px; border-radius:50%;
  background:var(--text3); transition:all 0.3s;
}
.save-dot.saving { background:var(--gold); animation:blink 0.7s infinite; }
.save-dot.saved { background:var(--green); }

</style>
</head>
